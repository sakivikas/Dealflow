services:
  - type: web
    name: dealflow-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: dealflow-data
      mountPath: /opt/render/project/src
      sizeGB: 1
